name: R3a Round Analyzer

on:
  push:
    branches:
      - main
    paths:
      - "runs/**"
      - "outputs/**"
      - "tools/**"
      - ".github/workflows/r3a_round_analyzer.yml"

permissions:
  contents: read

concurrency:
  group: r3a-round-analyzer
  cancel-in-progress: true

jobs:
  analyze:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Analyze latest round
        run: |
          python tools/analyze_round.py

      - name: Add analysis to job summary
        run: |
          if [ -f analysis/latest_round_analysis.md ]; then
            cat analysis/latest_round_analysis.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No latest analysis report generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload analysis artifact
        uses: actions/upload-artifact@v4
        with:
          name: r3a-round-analysis
          path: analysis/
